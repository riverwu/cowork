slideml: 1
deck:
  size: 16x9
  language: zh-CN
  theme: technical-blue

slides:
  - pattern: single-focus
    chrome: none
    regions:
      main:
        component: cover
        props:
          eyebrow: "市场报告 · 2026 Q1"
          title: "同传市场格局分析"
          subtitle: "AI 与传统服务的拐点已到"

  - pattern: section-divider
    chrome: none
    regions:
      main:
        component: section-divider
        props:
          eyebrow: "第一部分"
          title: "市场规模与增长"

  - pattern: single-focus
    regions:
      main:
        component: stat-grid-3
        props:
          title: "市场规模"
          items:
            - { value: "82.3亿", label: "市场规模",  delta: "+12% YoY", trend: up }
            - { value: "3,400万", label: "月活用户", delta: "+8%",      trend: up }
            - { value: "1.4×",   label: "ARPU",    delta: "持平",     trend: flat }

  - pattern: single-focus
    regions:
      main:
        component: visual-with-caption
        props:
          title: "各赛道收入"
          style: takeaway
          visual:
            kind: chart
            chartType: bar
            data:
              labels: ["AI 同传", "人工同传", "字幕生成", "翻译记忆"]
              series:
                - { name: "Q1 收入", values: [3200, 1800, 920, 650] }
            format: { y: wanyuan }
          caption: "AI 同传超过传统人工同传 1.7×。"

  - pattern: single-focus
    regions:
      main:
        component: visual-with-text
        props:
          title: "头部玩家定位"
          textKind: bullets
          bullets:
            - "三家头部厂商占据 62% 份额"
            - "字节跳动以技术领先优势加速渗透"
            - "传统会议同传向 AI 辅助稳步过渡"
            - "中长尾市场仍存在大量机会"
          visual:
            kind: image
            src: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkAAIAAAoAAv/lxKUAAAAASUVORK5CYII="
            alt: "竞争格局图"
