slideml: 1
deck:
  size: 16x9
  language: zh-CN
  theme: technical-blue

slides:
  - pattern: single-focus
    chrome: none
    regions:
      main:
        component: cover
        props:
          eyebrow: "Wave A 演示"
          title: "SlideML 表现力扩展"
          subtitle: "新增内容组件 + 表格 + 注释"
    notes: "演示者：开场介绍 Wave A 的目标。"

  - pattern: single-focus
    regions:
      main:
        component: agenda
        props:
          title: "目录"
          items:
            - "市场背景"
            - "产品对比"
            - "实施流程"
            - "数据汇总"
            - "总结展望"

  - pattern: single-focus
    chrome: none
    regions:
      main:
        component: title-only
        props:
          title: "01  市场背景"

  - pattern: single-focus
    regions:
      main:
        component: hero-image-overlay
        props:
          image:
            src: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkAAIAAAoAAv/lxKUAAAAASUVORK5CYII="
            alt: "市场环境"
          title: "AI 同传市场进入加速期"
          subtitle: "2026 Q1 同比增长 43%"
          align: "bottom-left"

  - pattern: two-column
    title: "AI 同传 vs 人工同传"
    regions:
      left:
        component: visual-with-text
        props:
          title: "AI 同传"
          text: "延迟低至 120ms。\n\n按使用计费，按需扩容。\n\n语种覆盖广，可同时输出字幕。"
      right:
        component: visual-with-text
        props:
          title: "人工同传"
          text: "高难度场景表达更自然。\n\n需提前预约，单价高。\n\n受译员体力与精度限制。"

  - pattern: single-focus
    regions:
      main:
        component: process-flow
        props:
          title: "实施流程"
          steps:
            - { title: "需求确认", description: "采集业务场景与术语库" }
            - { title: "试运行",   description: "小范围验证质量与体验" }
            - { title: "推广",     description: "扩展语种与组织覆盖" }
            - { title: "回顾迭代", description: "复盘指标，迭代模型" }

  - pattern: single-focus
    regions:
      main:
        component: data-table
        props:
          title: "各产品线 Q1 数据"
          table:
            header: ["产品线", "收入(万元)", "同比", "毛利率"]
            rows:
              - ["AI 同传",   "3200",  "+62%", "44%"]
              - ["人工同传", "1800",  "-12%", "31%"]
              - ["字幕生成",  "920",   "+18%", "52%"]
              - ["翻译记忆",  "650",   "+5%",  "48%"]
            colWidths: [3, 2, 2, 2]
    notes: "Q1 表现：AI 同传是增长引擎；人工同传同比下滑。"

  - pattern: single-focus
    regions:
      main:
        component: visual-with-caption
        props:
          title: "各赛道收入"
          style: takeaway
          visual:
            kind: chart
            chartType: bar
            data:
              labels: ["AI 同传", "人工同传", "字幕生成", "翻译记忆"]
              series:
                - { name: "Q1 收入", values: [3200, 1800, 920, 650] }
            format: { y: wanyuan }
          caption: "**AI 同传**超过传统人工同传 *1.7×*。"

  - pattern: single-focus
    regions:
      main:
        component: image-grid
        props:
          title: "客户案例"
          images:
            - { src: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkAAIAAAoAAv/lxKUAAAAASUVORK5CYII=", caption: "国际峰会" }
            - { src: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkAAIAAAoAAv/lxKUAAAAASUVORK5CYII=", caption: "教育直播" }
            - { src: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkAAIAAAoAAv/lxKUAAAAASUVORK5CYII=", caption: "企业培训" }
            - { src: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkAAIAAAoAAv/lxKUAAAAASUVORK5CYII=", caption: "跨国会议" }

  - pattern: single-focus
    chrome: none
    regions:
      main:
        component: closing
        props:
          title: "Q&A"
          subtitle: "感谢聆听"
