slideml: 1
deck:
  size: 16x9
  language: en-US
  theme: technical-blue

slides:
  - pattern: single-focus
    chrome: none
    regions:
      main:
        component: cover
        props:
          eyebrow: "Wave B Demo"
          title: "Hyperlinks · New Charts · Code Block"
          subtitle: "Interactivity and chart-type expansion"

  - pattern: single-focus
    regions:
      main:
        component: visual-with-caption
        props:
          title: "Stacked revenue (multi-product)"
          style: takeaway
          visual:
            kind: chart
            chartType: stacked-bar
            data:
              labels: ["Q1", "Q2", "Q3", "Q4"]
              series:
                - { name: "AI",       values: [3200, 4100, 5400, 6700] }
                - { name: "Manual",   values: [1800, 1700, 1600, 1500] }
                - { name: "Adjacent", values: [ 920, 1050, 1180, 1320] }
            format: { y: int }
          caption: "**AI** continues to outpace adjacent lines."

  - pattern: single-focus
    regions:
      main:
        component: visual-with-caption
        props:
          title: "Market share"
          style: takeaway
          visual:
            kind: chart
            chartType: doughnut
            data:
              labels: ["Vendor A", "Vendor B", "Vendor C", "Other"]
              series:
                - { name: "Share %", values: [42, 28, 18, 12] }
          caption: "Top three vendors hold ~88% of the market."

  - pattern: single-focus
    regions:
      main:
        component: visual-with-caption
        props:
          title: "Engagement trend"
          style: takeaway
          visual:
            kind: chart
            chartType: area
            data:
              labels: ["Wk1", "Wk2", "Wk3", "Wk4", "Wk5"]
              series:
                - { name: "DAU", values: [1200, 1480, 1720, 2010, 2340] }
            format: { y: int }
          caption: "Steady week-over-week growth."

  - pattern: single-focus
    regions:
      main:
        component: code-block
        props:
          title: "Compile a deck"
          language: "bash"
          code: |
            # 1. Install slideml
            pnpm add slideml

            # 2. Compile a deck
            slideml compile deck.json \
              --theme technical-blue \
              -o build/deck.pptx

            # 3. Validate without rendering
            slideml validate deck.json --theme technical-blue
          caption: "*See `slideml --help` for the full CLI surface.*"

  - pattern: single-focus
    regions:
      main:
        component: code-block
        props:
          title: "Programmatic API"
          language: "typescript"
          code: |
            import { compile } from "slideml";

            const result = await compile(json, {
              themeDir: "/path/to/themes/technical-blue",
              output: "/tmp/out.pptx",
            });

            console.log(`wrote ${result.buffer.length} bytes`);

  - pattern: single-focus
    chrome: none
    regions:
      main:
        component: closing
        props:
          title: "Thanks"
          subtitle: "Open the docs at example.com/slideml"
